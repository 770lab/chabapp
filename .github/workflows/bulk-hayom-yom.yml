name: Bulk Hayom Yom Scraper

on:
  workflow_dispatch:

jobs:
  bulk-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4
          playwright install chromium --with-deps

      - name: Run bulk Hayom Yom scraper
        run: python scrape_daily_studies.py --bulk-hyy

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hyy-data.json
          git diff --cached --quiet || git commit -m "Bulk load all Hayom Yom entries $(date +%Y-%m-%d)"
          git push
