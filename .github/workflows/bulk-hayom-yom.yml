name: Bulk Studies Scraper

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: bulk-hyy (Hayom Yom year entier) ou days-60 (toutes etudes 60j)'
        required: true
        default: 'days-60'
        type: choice
        options:
          - days-60
          - bulk-hyy
          - days-30

jobs:
  bulk-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4
          playwright install chromium --with-deps

      - name: Run bulk scraper
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ "$MODE" = "bulk-hyy" ]; then
            python scrape_daily_studies.py --bulk-hyy
          elif [ "$MODE" = "days-30" ]; then
            python scrape_daily_studies.py --days 30
          else
            python scrape_daily_studies.py --days 60
          fi

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hyy-data.json
          git diff --cached --quiet || git commit -m "Bulk studies scrape (${{ github.event.inputs.mode }}) $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
